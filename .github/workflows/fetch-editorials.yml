name: Fetch Editorials

on:
  schedule:
    # Runs at 01:30 UTC daily = 07:00 IST
    - cron: "30 1 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: write # needed to commit and push editorials.md

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -s editorials-scraper/requirements.txt ]; then
            pip install -r editorials-scraper/requirements.txt
          fi

      - name: Fetch and process editorials
        run: python editorials-scraper/scrape.py

      - name: Commit and push
        run: |
          git config user.name "joey-news-bot"
          git config user.email "joey-news-bot@users.noreply.github.com"
          git add editorials.md archive/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update editorials $(date +'%Y-%m-%d')"
          git push
